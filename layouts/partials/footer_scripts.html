{{ if .Site.Params.highlightjs }}
  <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/9.8.0/highlight.min.js"></script>

  <script type="text/javascript">
    hljs.initHighlightingOnLoad();
  </script>
{{ end }}
